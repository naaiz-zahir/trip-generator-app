<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Harbour Craft Message Generator</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
    <header class="header-container">
        <img src="cg-2nd-squadron.svg" alt="Logo" class="header-logo">
        <h1 class="header-title">HCMG</h1>
        <p class="header-subtitle">Harbour Craft Message Generator</p>
    </header>
    
    <div>
        <div class="form-group">
            <label for="boatName">Boat Name</label>
            <div class="input-with-btn">
                <select id="boatName"></select>
                <button type="button" class="add-btn" onclick="addNewItem('boatName', 'Boats')" title="Add Boat">+</button>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="departureFrom">Departure From</label>
                <div class="input-with-btn">
                    <select id="departureFrom"></select>
                    <button type="button" class="add-btn" onclick="addNewItem('departureFrom', 'Locations')" title="Add Location">+</button>
                </div>
            </div>
            <div class="form-group">
                <label for="destinationTo">Destination To</label>
                <div class="input-with-btn">
                    <select id="destinationTo"></select>
                    <button type="button" class="add-btn" onclick="addNewItem('destinationTo', 'Locations')" title="Add Location">+</button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="departureTime">Time of Departure</label>
            <input type="time" id="departureTime">
        </div>

        <div class="form-group">
            <div class="section-header">
                <label>Crew List</label>
                <button type="button" class="add-btn-small" onclick="addNewCheckboxItem('crewContainer', 'Crew')">+ Add Crew</button>
            </div>
            <div id="crewContainer" class="checkbox-grid"></div>
        </div>

        <div class="form-group">
            <div class="section-header">
                <label>Divers List</label>
                <button type="button" class="add-btn-small" onclick="addNewCheckboxItem('diversContainer', 'Divers')">+ Add Diver</button>
            </div>
            <div id="diversContainer" class="checkbox-grid"></div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="distance">Distance (nm)</label>
                <input type="number" id="distance" placeholder="0" step="0.1">
            </div>
            <div class="form-group">
                <label for="speed">Speed (knots)</label>
                <input type="number" id="speed" placeholder="0" step="0.1">
            </div>
            <div class="form-group">
                <label for="fuelBurnPerHour">Max Burn Rate (L/h)</label>
                <input type="number" id="fuelBurnPerHour" value="175" step="0.1">
            </div>
        </div>

        <div class="form-group">
            <label>Calculated Fuel Used: <span id="fuelCalculated">0</span> L</label>
        </div>

        <hr>

        <div class="form-group">
            <label>Departure Message Preview</label>
            <textarea id="messagePreview" readonly rows="12"></textarea>
        </div>

        <div class="message-actions">
            <button id="copyBtn" class="primary-btn">Copy Departure Message</button>
            <button id="viber-share-btn" class="viber-square-button" title="Share to Viber">
                <img src="viber.svg" alt="Viber" class="viber-icon">
            </button>
        </div>

        <hr style="margin: 20px 0; border: 0; border-top: 1px dashed #ccc;">
        
        <div class="form-group">
            <label for="arrivalTime">Actual Arrival Time</label>
            <input type="time" id="arrivalTime">
        </div>
        
        <div class="form-group">
            <label>Arrival Message Preview</label>
            <textarea id="arrivalMessagePreview" readonly rows="4"></textarea>
        </div>

        <div class="message-actions">
            <button id="copyArrivalBtn" class="primary-btn">Copy Arrival Message</button>
            <button id="viber-share-btn" class="viber-square-button" title="Share to Viber">
                <img src="viber.svg" alt="Viber" class="viber-icon">
            </button>
        </div>
    </div>

    <script src="app.js"></script>
    <footer class="app-footer">For Coast Guard Second Squadron use only</footer>
    </div>
</body>
</html>
